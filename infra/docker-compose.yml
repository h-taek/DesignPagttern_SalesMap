name: salesmap

# Docker로 띄우는 것은 외부 의존 서비스만 (DB, n8n).
# backend / ai는 각자 로컬 venv + uvicorn으로 실행한다. (GUIDELINE.md 참고)
# frontend도 로컬 npm dev.

services:
  db:
    image: postgres:16
    container_name: salesmap-db
    environment:
      POSTGRES_USER: salesmap
      POSTGRES_PASSWORD: salesmap
      POSTGRES_DB: salesmap
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/02-seed-trdar-map.sql:/docker-entrypoint-initdb.d/02-seed-trdar-map.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesmap -d salesmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: salesmap-n8n
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: Asia/Seoul
      N8N_SECURE_COOKIE: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro

volumes:
  pgdata:
  n8n_data:
